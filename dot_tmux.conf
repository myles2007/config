set -g default-terminal "tmux-256color"

# Remap standard C-b prefix command to C-a -- les awkaard
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
#bind-key "^A" vi-beginning-of-line
#bind-key "^E" vi-end-of-line

set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style


# Remap split commands to something more natural
# | <--- Split the window vertically
# - <--- Split the window horizontally
#
# Splits should open int he same path as the current pane
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

set-window-option -g mode-keys vi
set-window-option -g mouse on

# Switch panes without prefix using vim motion style
bind k select-pane -U # Up
bind j select-pane -D # Down
bind h select-pane -L # Left
bind l select-pane -R # Right

#bind a send-prefix
#

set -s set-clipboard external

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'sainnhe/tmux-fzf'

set-window-option -g window-status-current-style bg=red
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'


# Configure the catppuccin plugin
#set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "default"



# Load catppuccin -- Docs recommend direct load over TPM
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux
source -F '#{d:current_file}/.tmux/custom_modules/repo.conf'

# Make the status line pretty and add some modules
set -g status-right-length 1000
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
#set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_repo}"
set -ag status-right "#{E:@catppuccin_status_gitmux}"
set -ag status-left "#{E:@catppuccin_status_session}"

#run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
#run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux
# Or, if using TPM, just run TPM
#----------


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
